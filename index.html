<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>My Linktree</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500 flex items-center justify-center relative">

    <!-- 🔐 Elegant Login Button -->
    <a href="login.html"
       class="absolute top-6 right-6 px-4 py-2 rounded-full 
              bg-white/10 backdrop-blur-md 
              border border-white/20 
              text-white text-sm font-medium
              hover:bg-white/20 hover:scale-105
              transition duration-300 shadow-lg">
        🔐 Login
    </a>

    <div class="w-full max-w-md px-6 py-10 text-center text-white">

        <!-- Profile -->
        <img src="https://i.pravatar.cc/150"
             class="w-28 h-28 rounded-full mx-auto mb-4 border-4 border-white shadow-xl">

        <h1 class="text-2xl font-bold">Egov Happy</h1>
        <p class="text-sm opacity-80 mb-8">Digital Creator • Web Developer</p>

        <!-- Links Container -->
        <div id="linksContainer">
            <div class="animate-pulse space-y-4">
                <div class="h-12 bg-white/20 rounded-2xl"></div>
                <div class="h-12 bg-white/20 rounded-2xl"></div>
                <div class="h-12 bg-white/20 rounded-2xl"></div>
            </div>
        </div>

        <p class="mt-10 text-xs opacity-60">
            © 2026 Egovernment
        </p>

    </div>

    <script src="assets/js/main.js" defer></script>

</body>
</html>

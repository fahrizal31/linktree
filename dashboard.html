<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500">

<!-- WRAPPER -->
<div class="max-w-6xl mx-auto p-6">

    <!-- HEADER -->
    <div class="flex flex-col md:flex-row justify-between items-center mb-8 text-white">
        <div>
            <h1 class="text-3xl font-bold">Dashboard Link Manager</h1>
            <p class="text-sm opacity-80">Kelola semua link dengan mudah</p>
        </div>

        <button type="button"
            onclick="logout()"
            class="mt-4 md:mt-0 px-5 py-2 rounded-xl
                   bg-white/20 backdrop-blur-md
                   border border-white/30
                   hover:bg-red-500 hover:border-red-500
                   transition duration-300">
            Logout
        </button>
    </div>

    <!-- FORM TAMBAH LINK -->
    <div class="bg-white/10 backdrop-blur-xl border border-white/20 
                rounded-3xl p-6 shadow-xl mb-8 text-white">

        <h2 class="text-lg font-semibold mb-6">Tambah Link Baru</h2>

        <div class="grid md:grid-cols-2 gap-4">
            <input type="text" id="title" placeholder="Judul Link"
                class="px-4 py-3 rounded-xl 
                       bg-white/10 border border-white/20
                       focus:outline-none focus:ring-2 focus:ring-white/40
                       placeholder-white/60">

            <input type="text" id="url" placeholder="URL"
                class="px-4 py-3 rounded-xl 
                       bg-white/10 border border-white/20
                       focus:outline-none focus:ring-2 focus:ring-white/40
                       placeholder-white/60">
        </div>

        <button onclick="createLink()"
            class="mt-5 px-6 py-3 rounded-xl font-semibold
                   bg-white text-indigo-600
                   hover:scale-105 hover:shadow-xl
                   transition duration-300">
            + Tambah Link
        </button>
    </div>

    <!-- TABLE -->
    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">

        <div class="px-6 py-4 border-b">
            <h3 class="font-semibold text-gray-700">Daftar Link</h3>
        </div>

        <div class="overflow-x-auto">
            <table class="w-full text-sm">
                <thead class="bg-gray-100 text-gray-600 uppercase text-xs tracking-wider">
                    <tr>
                        <th class="p-4 text-left">Judul</th>
                        <th class="p-4 text-left">URL</th>
                        <th class="p-4 text-left">Aksi</th>
                    </tr>
                </thead>
                <tbody id="tableLinks" class="text-gray-700 divide-y">
                    <!-- Data dari API -->
                </tbody>
            </table>
        </div>
    </div>

</div>

<!-- SCRIPT -->
<script src="assets/js/config.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/dashboard.js"></script>

<script>
    checkLogin();
</script>

</body>
</html>

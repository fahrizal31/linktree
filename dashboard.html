<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Admin</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-indigo-600 via-purple-600 to-pink-500">

<!-- WRAPPER -->
<div class="max-w-6xl mx-auto p-6">

    <!-- HEADER -->
    <div class="flex flex-col md:flex-row justify-between items-center mb-8 text-white">
        <div>
            <h1 class="text-3xl font-bold">Dashboard Link Manager</h1>
            <p class="text-sm opacity-80">Kelola semua link dengan mudah</p>
        </div>

        <button type="button"
            onclick="logout()"
            class="mt-4 md:mt-0 px-5 py-2 rounded-xl
                   bg-white/20 backdrop-blur-md
                   border border-white/30
                   hover:bg-red-500 hover:border-red-500
                   transition duration-300">
            Logout
        </button>
    </div>

    <!-- FORM TAMBAH LINK -->
    <div class="bg-white/10 backdrop-blur-xl border border-white/20 
                rounded-3xl p-6 shadow-xl mb-8 text-white">

        <h2 class="text-lg font-semibold mb-6">Tambah Link Baru</h2>

        <div class="grid md:grid-cols-2 gap-4">
            <input type="text" id="title" placeholder="Judul Link"
                class="px-4 py-3 rounded-xl 
                       bg-white/10 border border-white/20
                       focus:outline-none focus:ring-2 focus:ring-white/40
                       placeholder-white/60">

            <input type="text" id="url" placeholder="URL"
                class="px-4 py-3 rounded-xl 
                       bg-white/10 border border-white/20
                       focus:outline-none focus:ring-2 focus:ring-white/40
                       placeholder-white/60">
        </div>

        <button onclick="createLink()"
            class="mt-5 px-6 py-3 rounded-xl font-semibold
                   bg-white text-indigo-600
                   hover:scale-105 hover:shadow-xl
                   transition duration-300">
            + Tambah Link
        </button>
    </div>

    <!-- TABLE -->
    <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">

        <div class="px-6 py-4 border-b">
            <h3 class="font-semibold text-gray-700">Daftar Link</h3>
        </div>

        <div class="overflow-x-auto p-4">
            <table class="w-full table-auto text-sm border-collapse">
                <thead class="bg-gray-100 text-gray-600 uppercase text-xs tracking-wider">
                    <tr>
                        <th class="p-3 text-left w-1/3">Judul</th>
                        <th class="p-3 text-left w-2/3 break-all">URL</th>
                        <th class="p-3 text-left">Aksi</th>
                    </tr>
                </thead>
                <tbody id="tableLinks" class="text-gray-700 divide-y">
                    <!-- Data akan di-render dari dashboard.js -->
                </tbody>
            </table>
        </div>
    </div>

</div>

<!-- ================= MODAL EDIT ================= -->
<div id="editModal" class="fixed inset-0 bg-black/40 hidden items-center justify-center z-50">
  <div class="bg-white w-full max-w-md p-6 rounded-2xl shadow-2xl">

    <h2 class="text-xl font-semibold mb-4 text-gray-800">
      Edit Link
    </h2>

    <input type="hidden" id="editId">

    <input type="text" id="editTitle"
      class="border border-gray-300 focus:ring-2 focus:ring-indigo-500 p-3 rounded-lg w-full mb-4 outline-none"
      placeholder="Judul Link">

    <input type="text" id="editUrl"
      class="border border-gray-300 focus:ring-2 focus:ring-indigo-500 p-3 rounded-lg w-full mb-6 outline-none break-all"
      placeholder="URL">

    <div class="flex justify-end gap-3">
      <button onclick="closeModal()"
        class="bg-gray-300 hover:bg-gray-400 text-gray-800 px-4 py-2 rounded-lg">
        Batal
      </button>

      <button onclick="updateLink()"
        class="bg-indigo-600 hover:bg-indigo-700 text-white px-4 py-2 rounded-lg">
        Simpan
      </button>
    </div>

  </div>
</div>
<!-- ============================================= -->

<!-- SCRIPT -->
<script src="assets/js/config.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/auth.js"></script>
<script src="assets/js/dashboard.js"></script>

<script>
    checkLogin();
</script>

</body>
</html>
